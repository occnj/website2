<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oasis Admin — Content Manager</title>
<link rel="stylesheet" href="admin/admin.css">
<style>
  a { color: var(--blue); }
  a:hover { color: var(--blue-dark); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="brand">
      <img src="uploads/logo-1776793086472.png" alt="Oasis">
      <div style="line-height:1.2">
        <div style="font-family:var(--font-head);font-weight:700;font-size:1.1rem">Oasis Admin</div>
        <div style="font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);font-weight:600">Content Manager</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Username or email</label>
      <input class="form-input" type="text" id="login-user" placeholder="Oasis" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="login-pass" autocomplete="current-password">
    </div>
    <div id="login-error" style="display:none;color:var(--red);font-size:.8rem;margin-bottom:10px"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="login-btn" onclick="login()">Sign In</button>
    <div class="supabase-note" id="supabase-note">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#3ECF8E"><path d="M13 2 3 14h8l-1 8L21 10h-8z"></path></svg>
      Secured by Supabase Auth
    </div>
  </div>
</div>

<!-- SHELL -->
<div class="admin-shell" id="admin-shell" style="display:none">
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar(false)"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="uploads/logo-1776793086472.png" alt="Oasis">
      <div class="sidebar-brand-text"><strong>Oasis Admin</strong><span>Content Manager</span></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <div class="sidebar-heading">Overview</div>
      <button class="side-link" data-view="dashboard">Dashboard</button>
      <div class="sidebar-heading" data-role="content">Content</div>
      <button class="side-link" data-view="pages" data-role="content">Pages</button>
      <button class="side-link" data-view="sermons" data-role="content">Sermons</button>
      <button class="side-link" data-view="events">Events</button>
      <button class="side-link" data-view="team" data-role="content">Team</button>
      <button class="side-link" data-view="give" data-role="content">Giving</button>
      <div class="sidebar-heading" data-role="content">Site</div>
      <button class="side-link" data-view="navigation" data-role="content">Navigation</button>
      <button class="side-link" data-view="media" data-role="content">Media</button>
      <div class="sidebar-heading" data-role="admin">Settings</div>
      <button class="side-link" data-view="users" data-role="admin">Users &amp; Roles</button>
    </nav>
    <div class="sidebar-foot">
      <div class="avatar" id="me-avatar">·</div>
      <div class="sidebar-foot-text"><strong id="me-name">—</strong><span id="me-role"></span></div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
      <h1 id="topbar-title">Dashboard</h1>
      <div class="topbar-actions">
        <a class="btn btn-sm btn-outline" href="index.html" target="_blank">View Live Site ↗</a>
        <button class="btn btn-sm btn-outline" onclick="logout()">Sign Out</button>
      </div>
    </div>
    <div id="view-container"></div>
  </div>
</div>

<!-- EDITOR MODAL (generic add/edit form) -->
<div class="modal-backdrop" id="editor-modal" onclick="if(event.target===this)closeEditor()">
  <div class="modal">
    <div class="panel-head"><div><h3 id="editor-title">Edit</h3></div>
      <button class="icon-btn" onclick="closeEditor()" aria-label="Close">✕</button>
    </div>
    <div class="panel-body" id="editor-body"></div>
    <div class="panel-body" style="display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:14px">
      <button class="btn btn-outline" onclick="closeEditor()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditor()">Save</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-backdrop" id="confirm-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal" style="max-width:420px">
    <div class="panel-body">
      <h3 style="font-family:var(--font-head);margin-bottom:8px">Are you sure?</h3>
      <p id="confirm-msg" style="font-size:.88rem;color:var(--gray-1)"></p>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
        <button class="btn btn-outline" onclick="document.getElementById('confirm-modal').classList.remove('open')">Cancel</button>
        <button class="btn" style="background:var(--red);color:#fff" onclick="runConfirm()">Yes, continue</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span class="check">✓</span><span id="toast-msg"></span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin/config.js"></script>
<script src="admin/db.js"></script>
<script src="admin/views.js"></script>
<script src="admin/actions.js"></script>
<script>
const TITLES = {
  dashboard: 'Dashboard', pages: 'Pages', sermons: 'Sermons', events: 'Events',
  team: 'Leadership Team', give: 'Giving', navigation: 'Navigation & Site Info',
  media: 'Media Library', users: 'Users & Roles',
};

const container = document.getElementById('view-container');

async function go(name) {
  document.querySelectorAll('.side-link').forEach(function (b) {
    b.classList.toggle('active', b.dataset.view === name);
  });
  document.getElementById('topbar-title').textContent = TITLES[name] || name;
  container.innerHTML = '<div class="view active"><div class="panel"><div class="panel-body" style="color:var(--gray-1)">Loading…</div></div></div>';
  toggleSidebar(false);
  localStorage.setItem('oasis-admin-view', name);
  const html = await window.VIEWS[name]();
  container.innerHTML = '<div class="view active" data-screen-label="' + (TITLES[name] || name) + '">' + html + '</div>';
  window.scrollTo(0, 0);
}

document.querySelectorAll('.side-link').forEach(function (b) {
  b.addEventListener('click', function () { go(b.dataset.view); });
});

function toggleSidebar(force) {
  const sb = document.getElementById('sidebar');
  const open = force !== undefined ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  document.getElementById('sidebar-backdrop').classList.toggle('show', open);
}

function loginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function showShell() {
  const me = await DB.loadProfile();
  if (!me) {
    loginError('Your account exists but has no profile row yet. An administrator must add you in Users & Roles (or run the profiles insert in supabase-setup.sql).');
    await DB.client.auth.signOut();
    return;
  }
  if (!me.active) {
    loginError('This account has been suspended. Contact an administrator.');
    await DB.client.auth.signOut();
    return;
  }
  // role-gate the sidebar
  const isAdmin = ['owner', 'admin'].indexOf(me.role) >= 0;
  const isEditor = isAdmin || me.role === 'editor';
  document.querySelectorAll('[data-role="admin"]').forEach(function (el) { el.style.display = isAdmin ? '' : 'none'; });
  document.querySelectorAll('[data-role="content"]').forEach(function (el) { el.style.display = isEditor ? '' : 'none'; });
  document.getElementById('me-name').textContent = me.full_name || me.email;
  document.getElementById('me-role').textContent = me.role === 'owner' ? 'Owner' : me.role;
  document.getElementById('me-avatar').textContent = (me.full_name || me.email || '?').split(' ').map(function (w) { return w[0]; }).slice(0, 2).join('').toUpperCase();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-shell').style.display = 'flex';
  const last = localStorage.getItem('oasis-admin-view') || 'dashboard';
  go((isEditor || last === 'events') ? last : 'dashboard');
}

async function login() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  document.getElementById('login-error').style.display = 'none';
  if (!DB.connected) { loginError('Supabase is not configured — add keys in admin/config.js.'); return; }
  const CFG = window.OASIS_CONFIG;
  const email = (user.toLowerCase() === (CFG.ADMIN_USERNAME || '').toLowerCase()) ? CFG.ADMIN_EMAIL : user;
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  const { error } = await DB.client.auth.signInWithPassword({ email: email, password: pass });
  btn.textContent = 'Sign In'; btn.disabled = false;
  if (error) { loginError('Sign-in failed: ' + error.message); return; }
  showShell();
}

async function logout() {
  if (DB.connected) await DB.client.auth.signOut();
  location.reload();
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2600);
}

document.getElementById('login-pass').addEventListener('keydown', function (e) { if (e.key === 'Enter') login(); });

// restore session
if (DB.connected) {
  DB.client.auth.getSession().then(function (res) {
    if (res.data.session) showShell();
  });
} else {
  document.getElementById('supabase-note').innerHTML = '<span style="color:var(--amber);font-weight:600">Not configured</span>&nbsp;— add Supabase keys in admin/config.js';
}
</script>
</body>
</html>
